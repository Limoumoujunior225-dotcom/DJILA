
<!DOCTYPE html>
<html>
<head>
  <title>Djila</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; margin:0; background:#f5f5f5;">

  <div style="background:#111; color:white; padding:15px; text-align:center;">
    <h2>DJILA</h2>
    <p>Alertes en temps réel</p>
  </div>

  <div style="padding:15px;">

    <h3>🚨 Signaler un problème</h3>

    <button onclick="addAlert('Accident')"
      style="padding:15px; width:100%; margin-bottom:10px;">
      Accident
    </button>

    <button onclick="addAlert('Embouteillage')"
      style="padding:15px; width:100%; margin-bottom:10px;">
      Embouteillage
    </button>

    <button onclick="addAlert('Route bloquée')"
      style="padding:15px; width:100%; margin-bottom:10px;">
      Route bloquée
    </button>

    <hr>

    <h3>📍 Alertes en direct</h3>

    <ul id="alerts"></ul>

    <button onclick="clearAlerts()"
      style="margin-top:10px; padding:10px;">
      Effacer les alertes
    </button>

  </div>

<script>
// Charger les alertes sauvegardées
let alerts = JSON.parse(localStorage.getItem("djila_alerts")) || [];

updateList();

// Ajouter une alerte
function addAlert(type) {
  let time = new Date().toLocaleTimeString();

  let alertText = type + " - " + time;

  alerts.unshift(alertText);

  localStorage.setItem("djila_alerts", JSON.stringify(alerts));

  updateList();
}

// Mettre à jour l’affichage
function updateList() {
  let list = document.getElementById("alerts");
  list.innerHTML = "";

  for (let i = 0; i < alerts.length; i++) {
    let li = document.createElement("li");
    li.innerHTML = "⚠️ " + alerts[i];
    list.appendChild(li);
  }
}

// Effacer les alertes
function clearAlerts() {
  alerts = [];
  localStorage.removeItem("djila_alerts");
  updateList();
}
</script>

</body>
</html>
