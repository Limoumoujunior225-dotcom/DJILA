
<!<!DOCTYPE html>
<html>
<head>
  <title>Djila</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Carte -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body style="margin:0; font-family:Arial;">

  <div style="background:#111; color:white; padding:15px; text-align:center;">
    <h2>DJILA MAPS</h2>
    <p>Signalements en Côte d’Ivoire</p>
  </div>

  <div id="map" style="height:60vh;"></div>

  <div style="padding:10px;">

    <button onclick="addMarker('Accident')" style="padding:10px; width:100%; margin-bottom:5px;">
      🚨 Accident
    </button>

    <button onclick="addMarker('Embouteillage')" style="padding:10px; width:100%; margin-bottom:5px;">
      🚗 Embouteillage
    </button>

    <button onclick="addMarker('Route bloquée')" style="padding:10px; width:100%;">
      ⛔ Route bloquée
    </button>

  </div>

<script>
let map = L.map('map').setView([5.36, -4.008], 12); // Abidjan

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
}).addTo(map);

function addMarker(type) {
  let marker = L.marker([5.36 + (Math.random()-0.5)*0.02, -4.008 + (Math.random()-0.5)*0.02])
    .addTo(map)
    .bindPopup("⚠️ " + type)
    .openPopup();
}
</script>

</body>
</html>
